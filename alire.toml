name = "sdata_core"
description = "Shared data-layer and evaluator library for sdata and data-vandal"
version = "0.1.17"

authors = ["John L. Ries"]
maintainers = ["John L. Ries <john@theyarnbard.com>"]
licenses = "GPL-3.0-only WITH GCC-exception-3.1"
website = ""
tags = ["library", "statistics", "data"]

[[depends-on]]
zipada = "^61.0.0"

[[depends-on]]
xmlada = "^26.0.0"

[[depends-on]]
mathpaqs = "^20260205.0.0"

# SData_Core.Table.Backing_Store.Finalize deliberately does NOT free its
# sqlite handle, to dodge a double-finalization crash in ada_sqlite3 0.1.1
# (the only published version).  When a newer ada_sqlite3 lets this
# constraint resolve past 0.1.1, re-test that workaround and drop the
# deliberate leak if fixed -- see the REVISIT note in
# src/sdata_core-table.adb (Backing_Store.Finalize).
[[depends-on]]
ada_sqlite3 = "^0.1.1"

[[actions]]
type = "pre-build"
command = ["sh", "scripts/fix-mathpaqs.sh"]
