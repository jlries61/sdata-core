name: Consumer Tests

# sdata-core has no test suite of its own: testing is the consumers'
# responsibility (see CLAUDE.md § "Public API — Stability Contract").
# This workflow runs the sdata consumer's `make check` against the
# sdata-core checkout under test, so a PR that breaks
# `SData_Core.Commands.Execute_*` signatures, `Config.Runtime` field
# shapes, or `Evaluator.Expression` variants is caught before merge.
#
# Mirrors sdata's own workflow in reverse: sdata's `.github/workflows/test.yml`
# clones sdata-core@main as a sibling; this workflow clones sdata at a
# pinned SHA as a sibling instead.  Pinning (rather than tracking main)
# means a broken sdata main does not fail this workflow for unrelated
# reasons.  Bump the SHA manually as sdata evolves.
#
# The other consumer (data-vandal) is intentionally NOT run here: it is
# a private repository, and authenticating cross-repo checkout would
# leak its build and test output into the public sdata-core Actions
# logs.  data-vandal validation remains a manual gate
# (`cd ~/Develop/data-vandal && make check`) per CLAUDE.md.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: consumer-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sdata:
    name: sdata make check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sdata-core (under test)
        uses: actions/checkout@v4
        with:
          path: sdata-core

      - name: Checkout sdata
        uses: actions/checkout@v4
        with:
          repository: jlries61/sdata
          # Pinned to jlries61/sdata@main at sdata-core 2026-05-22 (this PR).
          # Bump as needed: `git -C ../sdata rev-parse origin/main`.
          ref: e93f77b4728b3e472768b7ce583b29c937c7bfbc
          path: sdata

      - name: Set up Alire
        uses: alire-project/setup-alire@v3
        with:
          version: '2.1.0'

      - name: Cache Alire toolchain and packages
        uses: actions/cache@v4
        with:
          path: ~/.local/share/alire
          key: alire-${{ runner.os }}-sdata-${{ hashFiles('sdata-core/alire.toml', 'sdata/alire.toml') }}
          restore-keys: |
            alire-${{ runner.os }}-sdata-
            alire-${{ runner.os }}-

      - name: Install system dependencies
        run: sudo apt-get update -o Acquire::Languages=none && sudo apt-get install -y --no-install-recommends libsqlite3-dev

      - name: Build sdata
        working-directory: sdata
        run: alr build

      - name: Run sdata test suite
        working-directory: sdata
        run: alr exec -- make check

      - name: Fuzz corpus regression
        working-directory: sdata
        run: alr exec -- make fuzz-corpus
