name: Build

# Smoke build of the sdata-core library plus the in-crate test driver
# (Values, Parse_Expression, Call_Function — the pure-function subset
# of the public API, per audit Finding Beck B1).  Integration testing
# remains the consumers' responsibility and is automated separately
# in consumer-tests.yml.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  api-reference:
    # The HTML programmer's reference (docs/api/reference.html) is a checked-in
    # artifact generated from the .ads specs.  Verify the tracked copy matches a
    # fresh regeneration so it cannot silently drift from the public API.  Pure
    # Python (stdlib only) -- no Alire build needed, so this runs independently
    # of the library smoke build below.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Regenerate API reference
        run: scripts/gen-reference.sh

      - name: Verify tracked reference is up to date
        run: |
          if ! git diff --exit-code -- docs/api/reference.html; then
            echo "::error::docs/api/reference.html is out of date." \
                 "Run scripts/gen-reference.sh and commit the result." >&2
            exit 1
          fi

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Alire
        uses: alire-project/setup-alire@v3
        with:
          version: '2.1.0'

      - name: Cache Alire toolchain and packages
        uses: actions/cache@v4
        with:
          path: ~/.local/share/alire
          key: alire-${{ runner.os }}-${{ hashFiles('alire.toml') }}
          restore-keys: |
            alire-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          # GitHub's Ubuntu image ships Microsoft apt sources (azure-cli, prod)
          # that intermittently return 403 and abort apt-get update.  This
          # crate needs none of them, so drop them before updating; libsqlite3-dev
          # comes from the standard Ubuntu repositories.
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure*
          sudo apt-get update -o Acquire::Languages=none
          sudo apt-get install -y --no-install-recommends libsqlite3-dev

      - name: Build library
        run: alr build

      - name: Verify library archive
        run: test -f lib/libsdata_core.a

      - name: Run in-crate test driver
        run: tests/run-tests.sh
